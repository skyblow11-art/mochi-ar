<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>もちちゃんAR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background: #000; }
    model-viewer {
      width: 100vw;
      height: 100vh;
    }
    #ar-btn {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: pink;
      border: none;
      padding: 16px 32px;
      font-size: 18px;
      border-radius: 30px;
      z-index: 999;
    }
  </style>
</head>
<body>
  <model-viewer
    src="https://raw.githubusercontent.com/skyblow11-art/mochi-ar/main/mochi.glb"
    ar
    ar-modes="scene-viewer webxr"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="もちちゃん">
    <button slot="ar-button" id="ar-btn">🌸 ARで召喚</button>
  </model-viewer>
</body>
</html>
