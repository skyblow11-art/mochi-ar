<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>もちちゃんAR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background: #000; }
    model-viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <model-viewer
    src="mochi.glb"
    ar
    ar-modes="webxr"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="もちちゃん">
    <button slot="ar-button" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:pink;border:none;padding:16px 32px;font-size:18px;border-radius:30px;">🌸 ARで召喚</button>
  </model-viewer>
</body>
</html>
